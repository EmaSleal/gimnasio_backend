# =============================================================================
# GRAFANA DASHBOARD PROVISIONING CONFIGURATION
# =============================================================================
#
# Este archivo configura automáticamente el directorio de dashboards en Grafana
# mediante el sistema de provisioning.
#
# Documentación oficial:
# https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards
#
# =============================================================================

apiVersion: 1

providers:
  # Provider para dashboards del sistema de gimnasio
  - name: 'Gym Microservices Dashboards'
    orgId: 1
    folder: 'Gym System'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true

# =============================================================================
# CONFIGURACIÓN:
# =============================================================================
#
# NAME: Nombre del provider (identificador interno)
# ORG_ID: ID de la organización Grafana (1 = organización principal)
# FOLDER: Carpeta donde se organizarán los dashboards en Grafana UI
# TYPE: file = dashboards desde archivos JSON
# DISABLE_DELETION: false = permite eliminar dashboards desde UI
# UPDATE_INTERVAL_SECONDS: frecuencia de verificación de cambios en archivos
# ALLOW_UI_UPDATES: true = permite editar dashboards desde UI
# PATH: ruta donde Grafana busca archivos JSON de dashboards
# FOLDERS_FROM_FILES_STRUCTURE: usa estructura de carpetas del filesystem
#
# =============================================================================
# ESTRUCTURA DE ARCHIVOS:
# =============================================================================
#
# monitoring/grafana/dashboards/
# ├── spring-boot-stats.json     (Dashboard principal Spring Boot)
# ├── jvm-micrometer.json         (Dashboard JVM detallado)
# ├── spring-cloud-gateway.json   (Dashboard API Gateway)
# └── custom/                     (Dashboards personalizados)
#     └── gym-overview.json
#
# =============================================================================
# NOTAS:
# =============================================================================
#
# - Los dashboards se cargan automáticamente al iniciar Grafana
# - Los cambios en archivos JSON se detectan cada 10 segundos
# - Los dashboards son editables desde UI (útil para desarrollo)
# - En producción, considerar disableDeletion: true y allowUiUpdates: false
#
# =============================================================================

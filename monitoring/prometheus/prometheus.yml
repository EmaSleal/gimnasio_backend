# =============================================================================
# PROMETHEUS CONFIGURATION - Sistema de Gimnasio Backend
# =============================================================================
#
# Este archivo configura Prometheus para recolectar métricas de todos los
# microservicios del sistema de gimnasio.
#
# Endpoints monitoreados:
# - Eureka Server (Service Discovery)
# - Config Service (Configuración Centralizada)
# - Authentication Service (Autenticación JWT)
# - User Service (Gestión de Usuarios)
# - Workout Service (Gestión de Ejercicios)
# - API Gateway (Enrutamiento y Balanceo)
# - Admin Service (Monitoreo y Administración)
#
# =============================================================================

global:
  scrape_interval: 15s      # Frecuencia de recolección de métricas
  evaluation_interval: 15s  # Frecuencia de evaluación de reglas
  scrape_timeout: 10s       # Timeout para cada scrape

  # Etiquetas externas (útil para federación o alertas)
  external_labels:
    cluster: 'gym-microservices'
    environment: 'development'

# Configuración de Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Cargar reglas de alertas
rule_files:
  - '/etc/prometheus/alert.rules.yml'

# Configuración de scrape para cada microservicio
scrape_configs:
  # ==========================================================================
  # 1. PROMETHEUS - Auto-monitoreo
  # ==========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'
          tier: 'monitoring'

  # ==========================================================================
  # 2. EUREKA SERVER - Service Discovery
  # ==========================================================================
  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['eureka-server:8761']
        labels:
          application: 'eureka-server'
          tier: 'infrastructure'
          service_type: 'discovery'

  # ==========================================================================
  # 3. CONFIG SERVICE - Configuración Centralizada
  # ==========================================================================
  - job_name: 'config-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['config-service:8889']
        labels:
          application: 'config-service'
          tier: 'infrastructure'
          service_type: 'configuration'

  # ==========================================================================
  # 4. AUTHENTICATION SERVICE - Autenticación y JWT
  # ==========================================================================
  - job_name: 'authentication'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['authentication:8583']
        labels:
          application: 'authentication'
          tier: 'business'
          service_type: 'auth'
          database: 'postgres'

  # ==========================================================================
  # 5. USER SERVICE - Gestión de Usuarios
  # ==========================================================================
  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8588']
        labels:
          application: 'user-service'
          tier: 'business'
          service_type: 'crud'
          database: 'postgres'

  # ==========================================================================
  # 6. WORKOUT SERVICE - Gestión de Ejercicios y Rutinas
  # ==========================================================================
  - job_name: 'workout-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['workout-service:8586']
        labels:
          application: 'workout-service'
          tier: 'business'
          service_type: 'crud'
          database: 'postgres'

  # ==========================================================================
  # 7. API GATEWAY - Enrutamiento y Balanceo de Carga
  # ==========================================================================
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8590']
        labels:
          application: 'api-gateway'
          tier: 'edge'
          service_type: 'gateway'

  # ==========================================================================
  # 8. ADMIN SERVICE - Spring Boot Admin (Monitoreo)
  # ==========================================================================
  - job_name: 'admin-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['admin-service:9000']
        labels:
          application: 'admin-service'
          tier: 'monitoring'
          service_type: 'admin'

# =============================================================================
# MÉTRICAS RECOLECTADAS POR DEFECTO:
# =============================================================================
#
# Spring Boot Actuator expone automáticamente las siguientes métricas:
#
# JVM:
# - jvm_memory_used_bytes: Memoria usada por la JVM
# - jvm_threads_live_threads: Número de threads activos
# - jvm_gc_pause_seconds: Tiempo de pausa del Garbage Collector
#
# HTTP:
# - http_server_requests_seconds: Tiempo de respuesta de endpoints
# - http_server_requests_seconds_count: Número de requests
# - http_server_requests_seconds_sum: Suma total de tiempos
#
# Sistema:
# - system_cpu_usage: Uso de CPU del sistema
# - process_cpu_usage: Uso de CPU del proceso
# - system_load_average_1m: Carga promedio del sistema
#
# Tomcat/Servlet:
# - tomcat_sessions_active_current_sessions: Sesiones activas
# - tomcat_threads_busy_threads: Threads ocupados
#
# Base de Datos (para servicios con JPA):
# - hikaricp_connections_active: Conexiones activas
# - hikaricp_connections_idle: Conexiones inactivas
# - hikaricp_connections_pending: Conexiones pendientes
#
# Resilience4j (para API Gateway):
# - resilience4j_circuitbreaker_state: Estado del circuit breaker
# - resilience4j_retry_calls: Número de reintentos
#
# =============================================================================
# NOTAS:
# =============================================================================
#
# 1. Los targets usan nombres de contenedores Docker (resolución DNS interna)
# 2. Todos los servicios deben estar en la misma red Docker (spring)
# 3. El scrape_interval de 15s es adecuado para desarrollo
# 4. En producción, considerar aumentar a 30s o 60s
# 5. Las etiquetas (labels) permiten filtrar y agrupar métricas en Grafana
#
# ACCESO:
# - Prometheus UI: http://localhost:9090
# - Targets Status: http://localhost:9090/targets
# - Métricas: http://localhost:9090/graph
#
# =============================================================================

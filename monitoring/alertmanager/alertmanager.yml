# =============================================================================
# ALERTMANAGER CONFIGURATION - Sistema de Gimnasio Backend
# =============================================================================
#
# Este archivo configura cómo se manejan, agrupan y enrutan las alertas
# generadas por Prometheus.
#
# Componentes:
# 1. Global - Configuración general (templates, timeouts)
# 2. Route - Árbol de enrutamiento de alertas
# 3. Receivers - Destinos de notificaciones (email, Slack, etc.)
# 4. Inhibit Rules - Reglas para suprimir alertas redundantes
#
# =============================================================================

global:
  # Tiempo de espera antes de resolver automáticamente una alerta
  resolve_timeout: 5m
  
  # Configuración de SMTP (para notificaciones por email)
  # NOTA: Configurar con credenciales reales en producción
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alertas@gimnasio-backend.com'
  smtp_auth_username: 'alertas@gimnasio-backend.com'
  smtp_auth_password: 'CAMBIAR_EN_PRODUCCION'
  smtp_require_tls: true

# Templates personalizados (opcional)
# templates:
#   - '/etc/alertmanager/templates/*.tmpl'

# =============================================================================
# ROUTING TREE - Árbol de enrutamiento de alertas
# =============================================================================
route:
  # Receiver por defecto si ninguna ruta coincide
  receiver: 'default-receiver'
  
  # Tiempo de espera antes de enviar una notificación
  group_wait: 10s
  
  # Tiempo entre notificaciones del mismo grupo
  group_interval: 10s
  
  # Tiempo mínimo antes de reenviar una alerta
  repeat_interval: 12h
  
  # Agrupar alertas por estas etiquetas
  group_by: ['alertname', 'job', 'severity']
  
  # Rutas específicas basadas en labels
  routes:
    # =========================================================================
    # RUTA 1: Alertas CRÍTICAS - Notificación inmediata
    # =========================================================================
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 4h
      continue: false  # No continuar a otras rutas
      
    # =========================================================================
    # RUTA 2: Alertas de WARNING - Notificación agrupada
    # =========================================================================
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 12h
      continue: false
      
    # =========================================================================
    # RUTA 3: Alertas INFO - Solo registro
    # =========================================================================
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 1m
      group_interval: 30m
      repeat_interval: 24h
      continue: false
      
    # =========================================================================
    # RUTA 4: Alertas de Base de Datos - Equipo de DB
    # =========================================================================
    - match:
        category: database
      receiver: 'database-team'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 8h
      continue: true  # También enviar a rutas por severidad
      
    # =========================================================================
    # RUTA 5: Alertas de Disponibilidad - Equipo de Ops
    # =========================================================================
    - match:
        category: availability
      receiver: 'ops-team'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 6h
      continue: true

# =============================================================================
# RECEIVERS - Destinos de notificaciones
# =============================================================================
receivers:
  # ---------------------------------------------------------------------------
  # RECEIVER DEFAULT - Todas las alertas
  # ---------------------------------------------------------------------------
  - name: 'default-receiver'
    # Webhook genérico (para integración con sistemas externos)
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  # ---------------------------------------------------------------------------
  # RECEIVER CRÍTICO - Email + Slack + PagerDuty
  # ---------------------------------------------------------------------------
  - name: 'critical-alerts'
    # Email para alertas críticas
    email_configs:
      - to: 'oncall@gimnasio-backend.com'
        from: 'alertas@gimnasio-backend.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alertas@gimnasio-backend.com'
        auth_password: 'CAMBIAR_EN_PRODUCCION'
        headers:
          Subject: '🚨 ALERTA CRÍTICA: {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: red;">🚨 ALERTA CRÍTICA</h2>
          <p><strong>Alerta:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Servicio:</strong> {{ .GroupLabels.job }}</p>
          <p><strong>Severidad:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Descripción:</strong></p>
          <ul>
          {{ range .Alerts }}
            <li>{{ .Annotations.description }}</li>
          {{ end }}
          </ul>
          <p><strong>Acciones recomendadas:</strong></p>
          <pre>{{ range .Alerts }}{{ .Annotations.action }}{{ end }}</pre>
    
    # Slack para alertas críticas
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-critical'
        username: 'Prometheus Alerts'
        icon_emoji: ':rotating_light:'
        title: '🚨 ALERTA CRÍTICA: {{ .GroupLabels.alertname }}'
        text: |
          *Servicio:* {{ .GroupLabels.job }}
          *Severidad:* {{ .GroupLabels.severity }}
          {{ range .Alerts }}
          *Descripción:* {{ .Annotations.description }}
          *Impacto:* {{ .Annotations.impact }}
          *Acción:* {{ .Annotations.action }}
          {{ end }}
        send_resolved: true
        color: 'danger'
    
    # PagerDuty para alertas críticas (opcional)
    # pagerduty_configs:
    #   - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
    #     description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.job }}'

  # ---------------------------------------------------------------------------
  # RECEIVER WARNING - Email + Slack
  # ---------------------------------------------------------------------------
  - name: 'warning-alerts'
    email_configs:
      - to: 'dev-team@gimnasio-backend.com'
        headers:
          Subject: '⚠️ Alerta Warning: {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: orange;">⚠️ ALERTA WARNING</h2>
          <p><strong>Alerta:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Servicio:</strong> {{ .GroupLabels.job }}</p>
          <ul>
          {{ range .Alerts }}
            <li>{{ .Annotations.description }}</li>
          {{ end }}
          </ul>
    
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-warning'
        username: 'Prometheus Alerts'
        icon_emoji: ':warning:'
        title: '⚠️ Warning: {{ .GroupLabels.alertname }}'
        text: |
          *Servicio:* {{ .GroupLabels.job }}
          {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        color: 'warning'

  # ---------------------------------------------------------------------------
  # RECEIVER INFO - Solo Slack (no spam por email)
  # ---------------------------------------------------------------------------
  - name: 'info-alerts'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-info'
        username: 'Prometheus Alerts'
        icon_emoji: ':information_source:'
        title: 'ℹ️ Info: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        color: 'good'

  # ---------------------------------------------------------------------------
  # RECEIVER DATABASE TEAM - Equipo especializado
  # ---------------------------------------------------------------------------
  - name: 'database-team'
    email_configs:
      - to: 'db-team@gimnasio-backend.com'
        headers:
          Subject: '🗄️ Alerta de Base de Datos: {{ .GroupLabels.alertname }}'
        html: |
          <h2>🗄️ ALERTA DE BASE DE DATOS</h2>
          <p><strong>Alerta:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Servicio:</strong> {{ .GroupLabels.job }}</p>
          <ul>
          {{ range .Alerts }}
            <li>{{ .Annotations.description }}</li>
          {{ end }}
          </ul>

  # ---------------------------------------------------------------------------
  # RECEIVER OPS TEAM - Equipo de operaciones
  # ---------------------------------------------------------------------------
  - name: 'ops-team'
    email_configs:
      - to: 'ops-team@gimnasio-backend.com'
        headers:
          Subject: '🔧 Alerta de Disponibilidad: {{ .GroupLabels.alertname }}'
        html: |
          <h2>🔧 ALERTA DE DISPONIBILIDAD</h2>
          <p><strong>Alerta:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Servicio:</strong> {{ .GroupLabels.job }}</p>
          <ul>
          {{ range .Alerts }}
            <li>{{ .Annotations.description }}</li>
          {{ end }}
          </ul>

# =============================================================================
# INHIBIT RULES - Reglas de inhibición
# =============================================================================
# Suprimir alertas redundantes (ej: no notificar HighMemory si el servicio está DOWN)
inhibit_rules:
  # Si un servicio está DOWN, no notificar otras alertas de ese servicio
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '(HighMemoryUsage|HighLatencyP95|HighErrorRate.*)'
    equal: ['job', 'instance']

  # Si hay alerta crítica de memoria, suprimir warning de memoria
  - source_match:
      alertname: 'CriticalMemoryUsage'
    target_match:
      alertname: 'HighMemoryUsage'
    equal: ['job', 'instance']

  # Si hay latencia muy alta (p99), suprimir alerta de p95
  - source_match:
      alertname: 'VeryHighLatencyP99'
    target_match:
      alertname: 'HighLatencyP95'
    equal: ['job', 'uri']

  # Si Circuit Breaker está abierto, suprimir alertas de error rate
  - source_match:
      alertname: 'CircuitBreakerOpen'
    target_match_re:
      alertname: 'HighErrorRate.*'
    equal: ['job']

# =============================================================================
# NOTAS DE CONFIGURACIÓN:
# =============================================================================
#
# 1. SMTP Configuration:
#    - Reemplazar con credenciales reales en producción
#    - Considerar usar variables de entorno
#    - Para Gmail, habilitar "App Passwords"
#
# 2. Slack Webhooks:
#    - Crear webhook en: https://api.slack.com/messaging/webhooks
#    - Reemplazar URL en cada slack_configs
#    - Crear canales: #alerts-critical, #alerts-warning, #alerts-info
#
# 3. Testing:
#    - Probar con: amtool check-config alertmanager.yml
#    - Simular alerta: amtool alert add test severity=critical
#
# 4. Seguridad:
#    - NO commitear credenciales reales
#    - Usar secrets de Docker/Kubernetes en producción
#    - Rotar passwords periódicamente
#
# 5. Timeouts:
#    - group_wait: Espera antes de enviar notificación
#    - group_interval: Tiempo entre notificaciones del mismo grupo
#    - repeat_interval: Tiempo antes de reenviar alerta activa
#
# =============================================================================

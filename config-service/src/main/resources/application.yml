server:
  port: 8889

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
      fetch-registry: true
      register-with-eureka: true

spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: https://github.com/EmaSleal/config-server.git
          clone-on-start: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: Config Service
    description: Centralized Configuration Server
    version: 1.0.0
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}
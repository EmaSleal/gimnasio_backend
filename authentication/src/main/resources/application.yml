logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'

#puerto 8583
server:
    port: 8583
spring:
    application:
        name: authentication
    sleuth:
      propagation:
        type: w3c
      trace-id128: true
      supports-join: false
    zipkin:
      base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}

#eureka:
#  client:
#    service-url:
#      defaultZone: http://${EUREKA_HOST:192.168.100.111}:${EUREKA_PORT:8761}/eureka/
#      fetch-registry: true
#      register-with-eureka: true
jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
sender:
    key: ${RESEND_API_KEY}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: Authentication Service
    description: JWT authentication and user management
    version: 1.0.0
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}

services:
  eureka-server:
    container_name: eureka-server
    build:
      context: .                # ← raíz del repo
      dockerfile: ./eureka_server/Dockerfile
    ports: ["8761:8761"]
    networks: [spring]
    restart: unless-stopped

  config-service:
    container_name: config-service
    build:
      context: .
      dockerfile: ./config-service/Dockerfile
    ports: ["8889:8889"]
    networks: [spring]
    depends_on: [rabbitmq, eureka-server]
    restart: unless-stopped

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports: ["8590:8590"]
    networks: [spring]
    depends_on: [rabbitmq, eureka-server]
    restart: unless-stopped

  authentication:
    container_name: authentication
    build:
      context: .
      dockerfile: ./authentication/Dockerfile
    ports: ["8583:8583"]
    networks: [spring, postgres]
    depends_on: [rabbitmq, eureka-server, api-gateway, user-service]
    restart: unless-stopped

  user-service:
    container_name: user-service
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    ports: ["8588:8588"]
    networks: [spring, postgres]
    depends_on: [postgres, rabbitmq, eureka-server, api-gateway]
    restart: unless-stopped

  postgres:
    container_name: db-microservices
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: gym_authentication
    volumes:
      - postgres:/var/lib/postgresql/data   # estándar
    ports: ["5432:5432"]
    networks: [postgres]
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.9.11-management-alpine
    container_name: rabbitmq-user-service
    ports: ["5672:5672","15672:15672"]
    networks: [spring]

networks:
  postgres: { driver: bridge }
  spring:   { driver: bridge }

volumes:
  postgres:

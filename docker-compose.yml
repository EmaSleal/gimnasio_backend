# ========================================
# JVM Optimization Template
# ========================================
x-jvm-opts: &jvm_opts
  JAVA_TOOL_OPTIONS: >-
    -XX:+UseContainerSupport
    -XX:InitialRAMPercentage=10
    -XX:MaxRAMPercentage=70
    -XX:MaxMetaspaceSize=128m
    -XX:+UseG1GC
    -XX:+ExitOnOutOfMemoryError
    -Dspring.main.lazy-initialization=true
    -Dspring.jmx.enabled=false
    -Dlogging.level.root=INFO

services:
  eureka-server:
    container_name: eureka-server
    build:
      context: .
      dockerfile: ./eureka_server/Dockerfile
    ports: ["8761:8761"]
    networks: [spring]
    mem_limit: 512m
    mem_reservation: 384m
    oom_score_adj: 500
    environment:
      <<: *jvm_opts
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    restart: unless-stopped

  config-service:
    container_name: config-service
    build:
      context: .
      dockerfile: ./config-service/Dockerfile
    ports: ["8889:8889"]
    networks: [spring]
    mem_limit: 512m
    mem_reservation: 384m
    oom_score_adj: 500
    environment:
      <<: *jvm_opts
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      CONFIG_GIT_URI: ${CONFIG_GIT_URI}
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports: ["8590:8590"]
    networks: [spring]
    mem_limit: 768m
    mem_reservation: 512m
    oom_score_adj: 300
    environment:
      <<: *jvm_opts
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped

  authentication:
    container_name: authentication
    build:
      context: .
      dockerfile: ./authentication/Dockerfile
    ports: ["8583:8583"]
    networks: [spring, postgres]
    mem_limit: 768m
    mem_reservation: 512m
    oom_score_adj: 300
    environment:
      <<: *jvm_opts
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME_AUTH: ${DB_NAME_AUTH:-gym_authentication}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
      api-gateway:
        condition: service_started
      user-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    container_name: user-service
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    ports: ["8588:8588"]
    networks: [spring, postgres]
    mem_limit: 768m
    mem_reservation: 512m
    oom_score_adj: 300
    environment:
      <<: *jvm_opts
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME_AUTH: ${DB_NAME_AUTH:-gym_authentication}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
      api-gateway:
        condition: service_started
    restart: unless-stopped

  workout-service:
    container_name: workout-service
    build:
      context: .
      dockerfile: ./workout-service/Dockerfile
    ports: ["8586:8586"]
    networks: [spring, postgres]
    mem_limit: 768m
    mem_reservation: 512m
    oom_score_adj: 300
    environment:
      <<: *jvm_opts
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME_EXERCISE: ${DB_NAME_EXERCISE:-gym_exercise}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
      api-gateway:
        condition: service_started
    restart: unless-stopped

  admin-service:
    container_name: admin-service
    build:
      context: .
      dockerfile: ./admin-service/Dockerfile
    ports: ["9000:9000"]
    networks: [spring]
    mem_limit: 512m
    mem_reservation: 384m
    oom_score_adj: 500
    environment:
      <<: *jvm_opts
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on: [eureka-server]
    restart: unless-stopped

  postgres:
    container_name: db-microservices
    image: postgres:16
    mem_limit: 1024m
    mem_reservation: 768m
    oom_score_adj: 100
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME_EXERCISE:-docker}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports: ["5432:5432"]
    networks: [postgres]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.9.11-management-alpine
    container_name: rabbitmq-user-service
    mem_limit: 512m
    mem_reservation: 384m
    oom_score_adj: 400
    ports: ["5672:5672","15672:15672"]
    networks: [spring]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    mem_limit: 512m
    mem_reservation: 384m
    oom_score_adj: 600
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks: [spring]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    mem_limit: 256m
    mem_reservation: 192m
    oom_score_adj: 700
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks: [spring]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    mem_limit: 384m
    mem_reservation: 256m
    oom_score_adj: 600
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks: [spring]
    restart: unless-stopped

networks:
  postgres: { driver: bridge }
  spring:   { driver: bridge }

volumes:
  postgres:
  prometheus_data:
  grafana_data:
  alertmanager_data:

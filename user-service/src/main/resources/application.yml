logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'


server:
    port: 8588
spring:
    application:
        name: user-service
    sleuth:
      propagation:
        type: w3c
      trace-id128: true
      supports-join: false

    datasource: #postgres database configuration
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME_AUTH:gym_authentication}
        username: ${DB_USERNAME:postgres}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    
    # Flyway configuration
    flyway:
        enabled: true
        baseline-on-migrate: true
        baseline-version: 0
        locations: classpath:db/migration
        validate-on-migrate: true
        clean-disabled: true  # Disabled for production safety
    
    # RabbitMQ Configuration
    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}
        
    jpa:
        hibernate:
            ddl-auto: validate # Changed from 'create' to 'validate' - Flyway manages schema now
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
      fetch-registry: true
      register-with-eureka: true

jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: User Service
    description: User profile and management service
    version: 1.0.0
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}

logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'


server:
    port: 8588
spring:
    application:
        name: user-service
    sleuth:
      propagation:
        type: w3c
      trace-id128: true
      supports-join: false

    datasource: #postgres database configuration
        url: jdbc:postgresql://${DB_HOST:192.168.100.111}:${DB_PORT:5432}/${DB_NAME_AUTH:gym_authentication}
        username: ${DB_USERNAME:postgres}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: create #colocar none cuando ya se haya creado la base de datos
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

#eureka:
#  client:
#    service-url:
#      defaultZone: http://${EUREKA_HOST:192.168.100.111}:${EUREKA_PORT:8761}/eureka/
#      fetch-registry: true
#      register-with-eureka: true
jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: User Service
    description: User profile and management service
    version: 1.0.0
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}

logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'

#puerto 8590
server:
    port: 8590
spring:

    application:
        name: api-Gateway
    profiles:
      active: cors


    sleuth:
      propagation:
        type: w3c
      trace-id128: true
      supports-join: false

    cloud:
      gateway:
        globalcors:
          cors-configurations:
            '[/**]':
              allowedOrigins:
                - "http://localhost:4200"
              allowedMethods:
                - GET
                - POST
                - PUT
                - DELETE
              allowedHeaders:
                - "Origin"
                - "Access-Control-Allow-Origin"
                - "Content-Type"
                - "Accept"
                - "Jwt-Token"
                - "Authorization"
                - "Origin, Accept"
                - "X-Requested-With"
                - "Access-Control-Request-Method"
                - "Access-Control-Request-Headers"
                - "Access-Control-Allow-Origin"
                - "Access-Control-Allow-Credentials"
                - "Filename"
                - "AUTHORIZATION"
              allowCredentials: false
        discovery:
          locator:
            enabled: true
    # Zipkin deshabilitado temporalmente (servidor no disponible)
    # zipkin:
    # Zipkin deshabilitado temporalmente (servidor no disponible)
    # zipkin:
    #     base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}
    rabbitmq:
      host: ${RABBITMQ_HOST:localhost}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USERNAME:guest}
      password: ${RABBITMQ_PASSWORD:guest}

web:
  cors:
    allowed-origins: "http://localhost:4200"
    allowed-methods: "GET, POST, PATCH, PUT, DELETE, OPTIONS, HEAD"
    max-age: 3600
    allowed-headers: "Requestor-Type"
    exposed-headers: "X-Get-Header"

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
      fetch-registry: true
      register-with-eureka: true
jwt:
  secret: ${JWT_SECRET}

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-duration-threshold: 2000
        slow-call-rate-threshold: 50
        register-health-indicator: true
    instances:
      user-service:
        base-config: default
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      workout-service:
        base-config: default
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      authentication:
        base-config: default
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
  timelimiter:
    configs:
      default:
        timeout-duration: 3s
    instances:
      user-service:
        base-config: default
        timeout-duration: 3s
      workout-service:
        base-config: default
        timeout-duration: 3s
      authentication:
        base-config: default
        timeout-duration: 3s

# Actuator Configuration
management:
  # Deshabilitar Zipkin tracing (servidor no disponible)
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: ""
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        resilience4j.circuitbreaker.calls: true
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: API Gateway
    description: API Gateway with routing and load balancing
    version: 1.0.0
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}
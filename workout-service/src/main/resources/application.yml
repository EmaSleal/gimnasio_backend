logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'

#puerto 8583
server:
  port: 8586
spring:
  application:
    name: workout-service
  sleuth:
    propagation:
      type: w3c
    trace-id128: true
    supports-join: false
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}
  datasource: #postgres database configuration
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME_EXERCISE:gym_exercise}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # validate only, Flyway manages schema
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true # Handle existing databases
    clean-disabled: true # Prevent accidental data loss
    validate-on-migrate: true
    locations: classpath:db/migration
    schemas: public


eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
      fetch-registry: true
      register-with-eureka: true
# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: Workout Service
    description: Exercise and workout management service
    version: 1.0.0
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}

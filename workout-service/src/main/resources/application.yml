logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'

#puerto 8583
server:
  port: 8586
spring:
  application:
    name: workout-service
  sleuth:
    propagation:
      type: w3c
    trace-id128: true
    supports-join: false
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}
  datasource: #postgres database configuration
    url: jdbc:postgresql://${DB_HOST:192.168.100.111}:${DB_PORT:5432}/${DB_NAME_EXERCISE:gym_exercise}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop #colocar none cuando ya se haya creado la base de datos
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:192.168.100.111}:${EUREKA_PORT:8761}/eureka/
      fetch-registry: true
      register-with-eureka: true